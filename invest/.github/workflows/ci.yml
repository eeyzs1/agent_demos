name: CI

on:
  push:
    branches: [main, astock/advisor-system]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: |
          pip install ruff mypy
          pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ tests/
      - name: MyPy check
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
      - name: Run tests with coverage
        run: |
          pytest --cov=trading_system --cov-report=term-missing --cov-report=xml -v
      - name: Check coverage threshold
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          rate = float(tree.getroot().attrib['line-rate'])
          pct = rate * 100
          print(f'Coverage: {pct:.1f}%')
          if pct < 70:
              print('WARNING: Coverage below 70% threshold')
          else:
              print('Coverage meets 70% threshold')
          "

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          pip install build
          python -m build
