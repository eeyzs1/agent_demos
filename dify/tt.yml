          pubDate\") is not None else \"\",\n                # \"description\": item.find(\"\
          description\").text if item.find(\"description\") is not None else \"\"\
          ,\n                # \"source\": item.find(\"source\").text if item.find(\"\
          source\") is not None else \"\",\n                # \"source_url\": item.find(\"\
          source\").attrib.get(\"url\", \"\") if item.find(\"source\") is not None\
          \ else \"\"\n            }\n            news_items.append(news)\n      \
          \  # 返回字典，Dify 会自动序列化为 JSON\n        return {\"result\": news_items[:2]}\n\
          \    except Exception as e:\n        return {\"error\": str(e)}\n"
