    - data:
        code: "def main(news_data: list) -> dict:\n    \"\"\"\n    统计负面新闻比例，判断是否高风险。\n\
          \    假设数据结构: [{\"sentiment\": \"negative\", ...}, {\"sentiment\": \"positive\"\
          , ...}]\n    \"\"\"\n    if not news_data:\n        return {\"is_risky\"\
          : False, \"risk_ratio\": 0.0, \"total_count\": 0}\n    \n    total_count\
          \ = len(news_data)\n    negative_count = 0\n    \n    for item in news_data:\n\
          \        # 获取情感字段，转为小写防止大小写不一致\n        sentiment = str(item.get(\"sentiment\"\
          , \"\")).lower()\n        \n        # 判定逻辑：如果是 \"negative\" 则计数\n      \
          \  # 你也可以扩展逻辑：如果 score < 0.3 也算负面\n        if sentiment == \"negative\"\
          :\n            negative_count += 1\n    \n    # 计算比例\n    risk_ratio = negative_count\
          \ / total_count\n    \n    # 设定阈值：如果负面占比超过 50% (0.5)，标记为高风险\n    threshold\
          \ = 0.5\n    is_risky = risk_ratio > threshold\n    \n    return {\"is_risky\"\
          : is_risky,      # 布尔值，用于分支判断\n        \"risk_ratio\": risk_ratio,  # 浮点数，可用于报告展示\
          \ (如 \"负面率 60%\")\n        \"total_count\": total_count,} # 整数，新闻总数\n  \
          \  #     \"negative_count\": negative_count # 整数，负面新闻数\n"
